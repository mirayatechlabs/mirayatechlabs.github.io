    <script>
        const reactiveZone = document.getElementById('reactive-zone');
        let lastExecution = 0;

        if (reactiveZone) {
            reactiveZone.addEventListener('mousemove', (e) => {
                const now = Date.now();
                if (now - lastExecution < 90) return;
                lastExecution = now;
                createParticle(e.clientX, e.clientY);
            });
        }

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const rect = reactiveZone.getBoundingClientRect();
            const offsetX = x - rect.left;
            const offsetY = y - rect.top;

            const size = Math.random() * 10 + 6;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${offsetX - size / 2}px`;
            particle.style.top = `${offsetY - size / 2}px`;

            const tx = (Math.random() - 0.5) * 220;
            const ty = (Math.random() - 0.5) * 220;
            particle.style.setProperty('--tx', `${tx}px`);
            particle.style.setProperty('--ty', `${ty}px`);

            reactiveZone.appendChild(particle);
            setTimeout(() => particle.remove(), 1500);
        }
    </script>
